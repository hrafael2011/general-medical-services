[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
pythonpath = ["."]
markers = [
    "integration: tests that use real PostgreSQL and DeepSeek API (skip by default)",
]
addopts = ["-m", "not integration"]

